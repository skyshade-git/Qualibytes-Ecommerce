apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbshop
  namespace: qbshop
  labels:
    app: qbshop
spec:
  replicas: 2
  revisionHistoryLimit: 5

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: qbshop

  template:
    metadata:
      labels:
        app: qbshop

    spec:
      terminationGracePeriodSeconds: 30

      containers:
        - name: qbshop-app
          image: skyshadedocker/qbshop-app:4
          imagePullPolicy: Always

          ports:
            - containerPort: 3000

          envFrom:
            - configMapRef:
                name: qbshop-config
            - secretRef:
                name: qbshop-secrets

          env:
            - name: NEXTAUTH_URL
              valueFrom:
                configMapKeyRef:
                  name: qbshop-config
                  key: NEXTAUTH_URL

            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: qbshop-secrets
                  key: NEXTAUTH_SECRET

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: qbshop-secrets
                  key: JWT_SECRET

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          startupProbe:
            httpGet:
              path: /
              port: 3000
            failureThreshold: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
